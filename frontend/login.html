<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login · Sistema Comercial</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap');
  :root {
    --bg:#0f0e0c; --surface:#1a1814; --border:#2e2b24;
    --gold:#c9a84c; --gold-light:#e8c97a; --cream:#f5f0e8;
    --muted:#6b6455; --text:#f0ece3; --red:#e05c5c; --green:#4caf7d;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background-image: radial-gradient(ellipse at 30% 20%, rgba(201,168,76,0.06) 0%, transparent 60%);
  }
  .card {
    background:var(--surface); border:1px solid var(--border); border-radius:24px;
    padding:48px 44px; width:100%; max-width:400px;
    box-shadow:0 40px 80px rgba(0,0,0,0.4);
  }
  .logo { text-align:center; margin-bottom:36px; }
  .logo-icon { font-size:32px; margin-bottom:12px; }
  .logo-name { font-family:'Playfair Display',serif; font-size:26px; color:var(--gold-light); }
  .logo-sub { font-size:12px; color:var(--muted); margin-top:4px; text-transform:uppercase; letter-spacing:2px; }
  label { display:block; font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:8px; }
  input {
    width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border);
    border-radius:12px; padding:14px 16px; color:var(--text); font-size:14px;
    font-family:'DM Sans',sans-serif; outline:none; transition:border-color .2s;
    margin-bottom:20px;
  }
  input:focus { border-color:var(--gold); }
  input::placeholder { color:var(--muted); }
  button {
    width:100%; background:var(--gold); color:#1a1400; border:none; border-radius:12px;
    padding:15px; font-size:15px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif;
    transition:background .2s; margin-top:4px;
  }
  button:hover { background:var(--gold-light); }
  button:disabled { opacity:0.5; cursor:not-allowed; }
  .erro { background:rgba(224,92,92,0.1); border:1px solid rgba(224,92,92,0.3); border-radius:10px; padding:12px 16px; font-size:13px; color:var(--red); margin-bottom:16px; display:none; }
  .spinner { display:inline-block; width:16px; height:16px; border:2px solid #1a1400; border-top-color:transparent; border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-right:8px; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">👗</div>
    <div class="logo-name">Sistema Comercial</div>
    <div class="logo-sub">Loja de Roupas</div>
  </div>

  <div id="erro" class="erro"></div>

  <label for="email">E-mail</label>
  <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">

  <label for="senha">Senha</label>
  <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">

  <button id="btn" onclick="login()">Entrar</button>
</div>

<script>
  const API = '';  // mesmo domínio

  document.getElementById('senha').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  async function login() {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const btn = document.getElementById('btn');
    const erro = document.getElementById('erro');

    erro.style.display = 'none';
    if (!email || !senha) {
      mostrarErro('Preencha e-mail e senha.');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Entrando...';

    try {
      const resp = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, senha }),
      });
      const data = await resp.json();

      if (!resp.ok) {
        mostrarErro(data.detail || 'Erro ao fazer login.');
        return;
      }

      localStorage.setItem('token', data.token);
      localStorage.setItem('nome', data.nome);
      localStorage.setItem('is_gerente', data.is_gerente);

      window.location.href = data.is_gerente ? '/gerente' : '/vendedora';
    } catch (e) {
      mostrarErro('Erro de conexão. Tente novamente.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  }

  function mostrarErro(msg) {
    const el = document.getElementById('erro');
    el.textContent = msg;
    el.style.display = 'block';
  }

  // Redireciona se já logado
  const token = localStorage.getItem('token');
  if (token) {
    const isGerente = localStorage.getItem('is_gerente') === 'true';
    window.location.href = isGerente ? '/gerente' : '/vendedora';
  }
</script>
</body>
</html>
